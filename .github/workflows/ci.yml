name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - chore/**
      - refactor/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore FleetOps.sln --locked-mode

      - name: Build
        run: dotnet build FleetOps.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FleetOps.sln --no-build --configuration Release