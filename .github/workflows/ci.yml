name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - chore/**
      - refactor/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FleetOps.sln

      - name: Build
        run: dotnet build FleetOps.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FleetOps.sln --no-build --configuration Release